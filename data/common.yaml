---
# === Package Management ===
stunnel::packages_ensure: latest

# === Core Binaries & Service Identity ===
stunnel::bin_name: stunnel
stunnel::bin_path: /usr/bin
stunnel::user: root
stunnel::group: root

# === Paths & Directories ===
stunnel::config_dir: /etc/stunnel
stunnel::conf_d_dir: /etc/stunnel/conf.d
stunnel::cert_dir: /etc/stunnel/certs
stunnel::log_dir: /var/log/stunnel
stunnel::pid_dir: /run

# === Security Hardening ===
stunnel::chroot_enable: true
stunnel::chroot_dir: /var/run/stunnel

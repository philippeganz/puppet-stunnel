name: ModuleSync

on:
  schedule:
    - cron: '0 4 * * 1' # Every Monday at 4 AM
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  modulesync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install ModuleSync
        run: gem install modulesync

      - name: Run ModuleSync
        run: |
          msync update -f voxpupuli/modulesync_config -m "Update templates via modulesync"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update templates via modulesync'
          title: 'chore: update templates via modulesync'
          branch: modulesync-updates
          body: |
            This PR automatically applies the latest Vox Pupuli `modulesync_config` templates to modernize the Puppet module infrastructure.
          labels: |
            maintenance
